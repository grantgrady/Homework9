<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Creation with p5.play</title>
    <script src="libs/p5.min.js"></script>
    <script src="libs/planck.min.js"></script>
    <script src="libs/p5play.js"></script>
    <script src="js/sketch.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a472a, #0a2f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }
        
        .game-container {
            text-align: center;
        }
        
        canvas {
            border: 4px solid #ffd966;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        
        .info-panel {
            margin-top: 20px;
            padding: 12px 25px;
            background: rgba(0,0,0,0.8);
            border-radius: 50px;
            color: white;
            display: flex;
            gap: 40px;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        
        .info-panel span {
            color: #ffd966;
            font-size: 24px;
            margin-left: 8px;
        }
        
        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s;
        }
        
        button:hover {
            background: #ff4757;
            transform: scale(1.05);
        }
        
        .controls {
            margin-top: 15px;
            color: #ddd;
            font-size: 14px;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 25px;
        }
        
        .instructions {
            margin-top: 15px;
            color: #ffd966;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div id="gameCanvas"></div>
    <div class="info-panel">
        <div>⭐ SCORE: <span id="scoreValue">0</span> / 10</div>
        <div>❤️ HEALTH: <span id="healthValue">5</span></div>
        <button id="restartBtn">🔄 RESTART</button>
    </div>
    <div class="controls">
        🎮 WASD or ARROW KEYS to move
    </div>
    <div class="instructions">
        🌟 GOLDEN SQUARES = +1 Score &nbsp;&nbsp;|&nbsp;&nbsp; 💀 PURPLE SQUARES = -1 Health &nbsp;&nbsp;|&nbsp;&nbsp; 🪨 BROWN OBSTACLES = Block movement
    </div>
</div>
</body>
</html>
